name: Auto Renew Bot-hosting

on:
  schedule:
    - cron: '22 2 * * *' # 每天 UTC 02:22（北京时间 10:22，GitHub Actions 可能延迟）
  workflow_dispatch:

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: ⚙ 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 🛠️ 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk jq wget
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: ⚙ 设置代理 (sing-box)
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: 📥 拉取私库续期脚本
        uses: actions/checkout@v6
        with:
          #  👇 请务必把下面的 YOUR_GITHUB_USERNAME/YOUR_PRIVATE_REPO 替换为您真实的【用户名/私有仓库名】
          repository: 'vipcd/zhuanshu-jiaoben'
          token: ${{ secrets.GH_TOKEN }}
          path: private-repo

      - name: 🚀 运行续期脚本
        env:
          EMAIL: ${{ secrets.EMAIL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SESSION_TOKEN: ${{ secrets.SESSION_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 指定拉取下来的私库文件名 Bothosting-app.py 运行
          xvfb-run --auto-servernum python3 private-repo/Bothosting-app.py

      - name: 🧽 清理进程和临时文件
        if: always()
        run: |
          pkill -f sing-box || true
          pkill -f chromedriver || true
          pkill -f chrome || true
          pkill -f Xvfb || true
          rm -f sing-box sing-box-config.json sing-box.log

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取运行记录列表，通过循环确保只保留最新的一条当前记录，其余旧记录全部自动删除
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除旧运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
